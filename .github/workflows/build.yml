name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Universal Binary
            os: macos-latest
            cmake-flags: '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"'
          - name: Linux GCC
            os: ubuntu-latest
            cmake-flags: '-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++'
          - name: Linux Clang
            os: ubuntu-latest
            cmake-flags: '-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++'
          - name: Windows MSVC
            os: windows-latest
            msvc-arch: x64
            cmake-flags: ''
          - name: Windows Clang
            os: windows-latest
            msvc-arch: x64
            cmake-flags: '-DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl'
          - name: Windows MSVC ARM64
            os: windows-11-arm
            msvc-arch: arm64
            cmake-flags: ''
          - name: Windows Clang ARM64
            os: windows-11-arm
            msvc-arch: arm64
            cmake-flags: '-DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl'

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libcurl4-openssl-dev clang

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: egor-tensin/vs-shell@54e4148eac794e4580591c2e0b7750f14b7891fc # v2
        with:
          arch: ${{ matrix.msvc-arch }}

      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DEACP_CI_BUILD=ON ${{ matrix.cmake-flags }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  apphub-windows-install:
    name: AppHub Windows Install-to-Root
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up MSVC environment
        uses: egor-tensin/vs-shell@54e4148eac794e4580591c2e0b7750f14b7891fc # v2
        with:
          arch: x64

      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DEACP_UNITY_BUILD=OFF

      - name: Build privileged helper and updater tests
        run: cmake --build build --target AppHubPrivilegedHelper UpdaterTests

      - name: Privileged install unit tests
        run: ctest --test-dir build --output-on-failure -R "Updater/privileged|Updater/protectedApplications"

      - name: End-to-end install-to-root smoke test
        shell: pwsh
        run: ./Scripts/apphub-windows-install-smoke.ps1 -Helper build/Apps/System/AppHub/AppHubPrivilegedHelper.exe

  apphub-windows-update:
    name: AppHub Windows Publish + Update
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up MSVC environment
        uses: egor-tensin/vs-shell@54e4148eac794e4580591c2e0b7750f14b7891fc # v2
        with:
          arch: x64

      # The smoke test generates its own v1/v2 catalogs via the generator, so the
      # build-time dev catalog is disabled here to keep the hub build lean.
      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DEACP_UNITY_BUILD=OFF -DEACP_APPHUB_DISABLE_DEV_CATALOG=ON

      - name: Build hub, helper and a demo app
        run: cmake --build build --target AppHub AppHubPrivilegedHelper Maze

      - name: End-to-end publish + update flow
        shell: pwsh
        run: >
          ./Scripts/apphub-windows-update-smoke.ps1
          -AppHub build/Apps/System/AppHub/AppHub.exe
          -Helper build/Apps/System/AppHub/AppHubPrivilegedHelper.exe
          -BundleDir build/Apps/GPU/Maze

  build-ios:
    name: iOS Simulator
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -G Xcode -B build
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_SYSROOT=iphonesimulator
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO
          -DEACP_CI_BUILD=ON

      - name: Build
        run: cmake --build build --config Debug -- -sdk iphonesimulator
